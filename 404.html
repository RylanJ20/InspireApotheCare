<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // GitHub Pages clean URL support
    // Redirects /locations -> /locations.html, etc.
    var validPages = ['index', 'locations', 'careers', 'privacy', 'accessibility'];
    var path = window.location.pathname.replace(/^\//, '').replace(/\/$/, '');
    if (validPages.indexOf(path) !== -1) {
      window.location.replace('/' + path + '.html');
    }
  </script>
  <title>Page Not Found - Inspire ApotheCare Pharmacy</title>
</head>
<body>
  <p>Page not found. Redirecting...</p>
</body>
</html>
